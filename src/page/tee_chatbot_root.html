<!DOCTYPE html>
<html>
<head>
  <!-- 1️⃣ CSS -->
  <link rel="stylesheet" href="chatbot.css">
</head>
<body>

  <!-- ... таны нүүр хуудас ... -->

  <!-- 2️⃣ Chatbot HTML орох газар -->
  <div id="tee-chatbot-root"></div>

  <!-- 3️⃣ JS — chatbot.html-ийг fetch хийгээд, дараа chatbot.js-ийг ажиллуулна -->
  <script>
    fetch('chatbot.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('tee-chatbot-root').innerHTML = html;
        const script = document.createElement('script');
        script.src = 'chatbot.js';
        document.body.appendChild(script);
      });
  </script>

</body>
</html>
